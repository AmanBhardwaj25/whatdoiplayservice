name: Deploy To Proxmox LXC

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    environment: prod
    runs-on:
      - self-hosted
      - whatdoiplay
      - prod
    env:
      APP_DIR: ${{ secrets.PROD_APP_DIR }}
      SERVICE_NAME: ${{ secrets.PROD_SERVICE_NAME }}
    steps:
      - name: Validate required variables
        run: |
          set -euo pipefail
          if [ -z "${APP_DIR:-}" ]; then
            echo "Missing environment secret PROD_APP_DIR"
            exit 1
          fi
          if [ -z "${SERVICE_NAME:-}" ]; then
            echo "Missing environment secret PROD_SERVICE_NAME"
            exit 1
          fi

      - name: Ensure app directory exists
        run: |
          set -euo pipefail
          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Expected a git clone at $APP_DIR but did not find .git"
            exit 1
          fi

      - name: Mark deploy directory as safe for git
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$APP_DIR"

      - name: Deploy latest main
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          git fetch origin main
          git reset --hard origin/main

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          if [ -f package-lock.json ]; then
            npm ci --omit=dev
          else
            npm install --omit=dev
          fi

      - name: Install and build frontend
        run: |
          set -euo pipefail
          cd "$APP_DIR/frontend"
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Restart backend service
        run: |
          set -euo pipefail
          if [ "$(id -u)" -eq 0 ]; then
            systemctl restart "$SERVICE_NAME"
            systemctl is-active "$SERVICE_NAME"
          elif command -v sudo >/dev/null 2>&1; then
            sudo -n systemctl restart "$SERVICE_NAME"
            sudo -n systemctl is-active "$SERVICE_NAME"
          else
            echo "Runner user needs passwordless sudo for systemctl on $SERVICE_NAME."
            exit 1
          fi

      - name: Show backend logs (tail)
        if: always()
        run: |
          set -euo pipefail
          if [ "$(id -u)" -eq 0 ]; then
            journalctl -u "$SERVICE_NAME" -n 60 --no-pager
          elif command -v sudo >/dev/null 2>&1; then
            sudo -n journalctl -u "$SERVICE_NAME" -n 60 --no-pager
          else
            echo "Skipping journalctl: passwordless sudo is not configured for runner user."
          fi
