name: Deploy To Proxmox LXC

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    environment: prod
    runs-on:
      - self-hosted
      - whatdoiplay
      - prod
    env:
      APP_DIR: ${{ vars.PROD_APP_DIR || secrets.PROD_APP_DIR }}
      SERVICE_NAME: ${{ vars.PROD_SERVICE_NAME || secrets.PROD_SERVICE_NAME }}
    steps:
      - name: Validate required variables
        env:
          STEAM_TOKEN: ${{ vars.STEAM_TOKEN || secrets.STEAM_TOKEN }}
          STEAM_SECRET: ${{ vars.STEAM_SECRET || secrets.STEAM_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_DIR:-}" ]; then
            echo "Missing PROD_APP_DIR (vars or secrets)"
            exit 1
          fi
          if [ -z "${SERVICE_NAME:-}" ]; then
            echo "Missing PROD_SERVICE_NAME (vars or secrets)"
            exit 1
          fi
          if [ -z "${STEAM_TOKEN:-}" ]; then
            echo "Missing STEAM_TOKEN (vars or secrets)"
            exit 1
          fi
          if [ -z "${STEAM_SECRET:-}" ]; then
            echo "Missing STEAM_SECRET (vars or secrets)"
            exit 1
          fi

      - name: Ensure app directory exists
        run: |
          set -euo pipefail
          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Expected a git clone at $APP_DIR but did not find .git"
            exit 1
          fi

      - name: Render backend .env from environment values
        env:
          STEAM_TOKEN: ${{ vars.STEAM_TOKEN || secrets.STEAM_TOKEN }}
          STEAM_SECRET: ${{ vars.STEAM_SECRET || secrets.STEAM_SECRET }}
          AUTH_SIGNING_SECRET: ${{ vars.AUTH_SIGNING_SECRET || secrets.AUTH_SIGNING_SECRET }}
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN || secrets.FRONTEND_ORIGIN }}
          BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL || secrets.BACKEND_BASE_URL }}
          FRONTEND_LANDING_PATH: ${{ vars.FRONTEND_LANDING_PATH || secrets.FRONTEND_LANDING_PATH }}
          AUTH_COOKIE_NAME: ${{ vars.AUTH_COOKIE_NAME || secrets.AUTH_COOKIE_NAME }}
          AUTH_TOKEN_TTL_MS: ${{ vars.AUTH_TOKEN_TTL_MS || secrets.AUTH_TOKEN_TTL_MS }}
          AUTH_COOKIE_SAMESITE: ${{ vars.AUTH_COOKIE_SAMESITE || secrets.AUTH_COOKIE_SAMESITE }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS || secrets.CORS_ORIGINS }}
          NODE_ENV: ${{ vars.NODE_ENV || secrets.NODE_ENV }}
          PORT: ${{ vars.PORT || secrets.PORT }}
        run: |
          set -euo pipefail
          : "${NODE_ENV:=production}"
          : "${PORT:=3000}"
          : "${AUTH_TOKEN_TTL_MS:=604800000}"
          : "${AUTH_COOKIE_NAME:=wdps_auth}"
          : "${AUTH_COOKIE_SAMESITE:=lax}"
          : "${FRONTEND_LANDING_PATH:=/landing}"
          {
            echo "STEAM_TOKEN=${STEAM_TOKEN}"
            echo "STEAM_SECRET=${STEAM_SECRET}"
            echo "AUTH_SIGNING_SECRET=${AUTH_SIGNING_SECRET}"
            echo "FRONTEND_ORIGIN=${FRONTEND_ORIGIN}"
            echo "BACKEND_BASE_URL=${BACKEND_BASE_URL}"
            echo "FRONTEND_LANDING_PATH=${FRONTEND_LANDING_PATH}"
            echo "AUTH_COOKIE_NAME=${AUTH_COOKIE_NAME}"
            echo "AUTH_TOKEN_TTL_MS=${AUTH_TOKEN_TTL_MS}"
            echo "AUTH_COOKIE_SAMESITE=${AUTH_COOKIE_SAMESITE}"
            echo "CORS_ORIGINS=${CORS_ORIGINS}"
            echo "NODE_ENV=${NODE_ENV}"
            echo "PORT=${PORT}"
          } > "$APP_DIR/.env"
          chmod 600 "$APP_DIR/.env"

      - name: Mark deploy directory as safe for git
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$APP_DIR"

      - name: Deploy latest main
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          git fetch origin main
          git reset --hard origin/main

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          if [ -f package-lock.json ]; then
            npm ci --omit=dev
          else
            npm install --omit=dev
          fi

      - name: Install and build frontend
        run: |
          set -euo pipefail
          cd "$APP_DIR/frontend"
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Restart backend service
        run: |
          set -euo pipefail
          if [ "$(id -u)" -eq 0 ]; then
            systemctl restart "$SERVICE_NAME"
            systemctl is-active "$SERVICE_NAME"
          elif command -v sudo >/dev/null 2>&1; then
            sudo -n systemctl restart "$SERVICE_NAME"
            sudo -n systemctl is-active "$SERVICE_NAME"
          else
            echo "Runner user needs passwordless sudo for systemctl on $SERVICE_NAME."
            exit 1
          fi

      - name: Show backend logs (tail)
        if: always()
        run: |
          set -euo pipefail
          if [ "$(id -u)" -eq 0 ]; then
            journalctl -u "$SERVICE_NAME" -n 60 --no-pager
          elif command -v sudo >/dev/null 2>&1; then
            sudo -n journalctl -u "$SERVICE_NAME" -n 60 --no-pager
          else
            echo "Skipping journalctl: passwordless sudo is not configured for runner user."
          fi
