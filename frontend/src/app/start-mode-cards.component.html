<section class="mode-group">
  <h2>Choose How To Start</h2>

  <div class="cards">
    <button type="button" class="mode-card active" (click)="onStartClassic()">
      <span class="mode-title">Classic</span>
      <span class="mode-desc">Start a random head-to-head bracket from your top 30 games.</span>
    </button>

    <article class="mode-card disabled" aria-disabled="true">
      <span class="mode-title">More Modes</span>
      <span class="mode-desc">Coming soon.</span>
    </article>
  </div>
</section>
